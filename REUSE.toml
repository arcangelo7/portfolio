version = 1

# CC0-1.0 — no creative expression (metadata, config, auto-generated, factual data)

[[annotations]]
path = [
    ".metadata",
    ".releaserc.json",
    ".vscode/settings.json",
    "assets/data/conferences.json",
    "assets/data/education.json",
    "assets/data/languages.json",
    "assets/data/personal_info.json",
    "assets/data/skills.json",
    "assets/data/work_experience.json",
    "ios/Flutter/AppFrameworkInfo.plist",
    "ios/Runner.xcodeproj/**",
    "ios/Runner.xcworkspace/**",
    "ios/Runner/Assets.xcassets/AppIcon.appiconset/Contents.json",
    "ios/Runner/Assets.xcassets/LaunchImage.imageset/Contents.json",
    "ios/Runner/Assets.xcassets/LaunchImage.imageset/LaunchImage.png",
    "ios/Runner/Assets.xcassets/LaunchImage.imageset/LaunchImage@2x.png",
    "ios/Runner/Assets.xcassets/LaunchImage.imageset/LaunchImage@3x.png",
    "ios/Runner/Base.lproj/LaunchScreen.storyboard",
    "ios/Runner/Base.lproj/Main.storyboard",
    "ios/Runner/Info.plist",
    "linux/flutter/generated_plugin_registrant.cc",
    "linux/flutter/generated_plugin_registrant.h",
    "linux/flutter/generated_plugins.cmake",
    "macos/Flutter/GeneratedPluginRegistrant.swift",
    "macos/Runner.xcodeproj/**",
    "macos/Runner.xcworkspace/**",
    "macos/Runner/Assets.xcassets/AppIcon.appiconset/Contents.json",
    "macos/Runner/Base.lproj/MainMenu.xib",
    "macos/Runner/DebugProfile.entitlements",
    "macos/Runner/Info.plist",
    "macos/Runner/Release.entitlements",
    "pubspec.lock",
    "test/coverage-badge.svg",
    "web/manifest.json",
    "web/robots.txt",
    "windows/flutter/generated_plugin_registrant.cc",
    "windows/flutter/generated_plugin_registrant.h",
    "windows/flutter/generated_plugins.cmake",
    "windows/runner/runner.exe.manifest",
]
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"

# ISC — developer-written files (2025)

[[annotations]]
