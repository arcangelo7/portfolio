    "android/playstore/play_store_512.png",
    "assets/images/dark_mode.png",
    "assets/images/dark_mode_button.png",
    "assets/images/foto_cv.png",
    "assets/images/icon-512.png",
    "assets/images/icon_oc_positive.png",
    "assets/images/light_mode.png",
    "assets/images/preview.png",
    "assets/images/profile_cutout.webp",
    "ios/Runner/Assets.xcassets/AppIcon.appiconset/*.png",
    "web/favicon.ico",
    "web/icons/**",
    "windows/runner/resources/app_icon.ico",
]
SPDX-FileCopyrightText = "2025 Arcangelo Massari <info@arcangelomassari.com>"
SPDX-License-Identifier = "ISC"

# ISC — developer-written files (2025-2026)

[[annotations]]
